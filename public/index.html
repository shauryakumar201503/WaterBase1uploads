<!DOCTYPE html>
<html>
<head>
  <title>WaterBase Upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>WaterBase Upload</h1>

  <form id="uploadForm" enctype="multipart/form-data">
    <input type="text" id="usernameInput" placeholder="Your username"><br>

    <input type="file" id="fileInput"><br>
    <input type="password" id="passwordInput" placeholder="Set password"><br>

    <button type="button" onclick="uploadFile()">Upload</button>
  </form>

  <p id="result"></p>

  <script src="script.js"></script>
</body>
</html>
