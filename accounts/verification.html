<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Code – WaterBase</title>
    <link rel="stylesheet" href="verification.css">
</head>
<body>

    <div class="container">

        <div class="header-box">
            <h1>Verification code</h1>
        </div>

        <div class="code-box">
            <input id="codeInput" maxlength="5" placeholder="-----">
        </div>

        <div class="button-row">
            <button id="prevBtn" class="nav-btn">Previous</button>
            <button id="nextBtn" class="nav-btn">Next</button>
        </div>

        <div class="info-box">
            <p>Check your Gmail inbox!<br>
            The 5-digit code is sent to your Gmail account by roboverseentertainment@gmail.com</p>
        </div>

    </div>

    <script src="createaccount.js"></script>
</body>
</html>
