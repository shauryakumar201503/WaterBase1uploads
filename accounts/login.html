<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – WaterBase</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <div class="header-box">
            <h1>Login</h1>
        </div>

        <div class="form-box">
            <input id="usernameInput" type="text" placeholder="Write your username">
            <input id="passwordInput" type="password" placeholder="Write your password">
        </div>

        <div class="button-row">
            <button id="backBtn" class="nav-btn">Back</button>
            <button id="loginBtn" class="nav-btn">Login</button>
        </div>

    </div>

    <script src="login.js"></script>
</body>
</html>
