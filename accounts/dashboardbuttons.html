<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard – Buttons</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="container">

        <div class="header-box">
            <h1>Dashboard</h1>
            <p id="welcomeText"></p>
        </div>

        <div class="button-grid">

            <button class="dash-btn" id="uploadBtn">Upload File</button>
            <button class="dash-btn" id="createWebsiteBtn">Create Website</button>
            <button class="dash-btn" id="viewWebsitesBtn">View Websites</button>
            <button class="dash-btn" id="viewFilesBtn">View Files</button>
            <button class="dash-btn" id="othersBtn">Other Dashboard</button>
            <button class="dash-btn logout" id="logoutBtn">Logout</button>

        </div>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
