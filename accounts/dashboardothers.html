<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard – Other Info</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="container">

        <div class="header-box">
            <h1>Account Information</h1>
        </div>

        <div class="info-box">
            <p><strong>Username:</strong> <span id="usernameInfo"></span></p>
            <p><strong>Gmail:</strong> <span id="gmailInfo"></span></p>
            <p><strong>Total Uploads:</strong> <span id="uploadCount"></span></p>
            <p><strong>Total Websites:</strong> <span id="websiteCount"></span></p>
            <p><strong>Storage Used:</strong> <span id="storageUsed"></span></p>
        </div>

        <button id="backBtn" class="back-btn">Back to Dashboard</button>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
