<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account – WaterBase</title>
    <link rel="stylesheet" href="create.css">
</head>
<body>

    <div class="container">

        <div class="header-box">
            <h1>Create Account</h1>
        </div>

        <div class="form-box">
            <input id="gmailInput" type="email" placeholder="Write your Gmail account">
            <input id="usernameInput" type="text" placeholder="Choose username">
            <input id="passwordInput" type="password" placeholder="Choose password">
        </div>

        <button id="nextBtn" class="next-btn">Next</button>

    </div>

    <script src="createaccount.js"></script>
</body>
</html>
